name: SonarCloud

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell
        working-directory: ${{ github.workspace }}/ChessMultitool

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install Android/Maui workloads
        run: |
          dotnet workload restore
          dotnet workload install android --skip-manifest-update
          try { dotnet workload install maui-android --skip-manifest-update } catch { Write-Host "maui-android skipped" }

      - name: Restore
        run: dotnet restore ChessMultitool.csproj

      - name: Sonar begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin `
            /k:"ironjerseys_ChessMultitool" `
            /o:"jorisreynes" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.scanner.skipJreProvisioning=true

          if (-not (Test-Path ".sonarqube\conf\SonarQubeAnalysisConfig.xml")) {
            throw "Sonar begin did not create .sonarqube\conf\SonarQubeAnalysisConfig.xml"
          }

      - name: Build
        run: dotnet build ChessMultitool.csproj -c Release --no-restore --no-incremental

      - name: Sonar end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"