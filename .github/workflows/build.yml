name: SonarCloud

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    defaults:
      run:
        shell: powershell
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install Android and MAUI workloads
        run: |
          dotnet workload restore
          dotnet workload install android --skip-manifest-update
          try { dotnet workload install maui-android --skip-manifest-update } catch { Write-Host "maui-android skipped" }

      - name: Restore solution
        run: dotnet restore ChessMultitool.sln

      - name: Sonar begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SONAR_TOKEN)) {
            throw "SONAR_TOKEN is empty or missing"
          }

          dotnet sonarscanner begin `
            /k:"ironjerseys_ChessMultitool" `
            /o:"jorisreynes" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" `
            /d:sonar.scanner.skipJreProvisioning=true

          if (-not (Test-Path ".sonarqube\conf\SonarQubeAnalysisConfig.xml")) {
            throw "Sonar begin did not create .sonarqube\conf\SonarQubeAnalysisConfig.xml"
          }

      - name: Build solution
        run: dotnet build ChessMultitool.sln -c Release --no-restore --no-incremental

      - name: Test with coverage
        run: |
          dotnet test .\ChessMultitool.Tests\ChessMultitool.Tests.csproj `
            -c Release `
            --no-build `
            --collect:"XPlat Code Coverage" `
            --settings .\ChessMultitool.Tests\coverlet.runsettings `
            --results-directory .\ChessMultitool.Tests\TestResults

      - name: Sonar end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"